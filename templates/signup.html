<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

    <div class="signup-box">

        <h1>Create Account</h1>
        <p>JWT Team Management System</p>

        <form action="{{ url_for('auth.signup') }}" method="POST">

            <input
                type="text"
                name="full_name"
                placeholder="Full Name"
                required>

            <input
                type="text"
                name="username"
                placeholder="Username"
                required>

            <input
                type="email"
                name="email"
                placeholder="Email"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit">
                Sign Up
            </button>

        </form>

        <div class="login-link">
            Already have an account?
            <a href="{{ url_for('auth.signin') }}">
                Sign In
            </a>
        </div>

    </div>

</div>

</body>

</html>
