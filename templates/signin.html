<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign In</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

    <div class="signup-box">

        <h1>Welcome Back</h1>

        <p>Sign in to continue</p>

        <form method="POST">

            <input type="email"
                   name="email"
                   placeholder="Email"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Sign In
            </button>

        </form>

        <div class="login-link">

            Don't have an account?

            <a href="{{ url_for('auth.signup') }}">
                Sign Up
            </a>

        </div>

    </div>

</div>

</body>

</html>
